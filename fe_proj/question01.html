<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 3択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題2: 以下の記号はどの回路の記号ですか？
			</h3>
			<img src="image/AND回路の図.png">

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. NOT回路
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. AND回路
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. OR回路
                </label>
<!--                <label>-->
<!--                    <input type="radio" name="q1" value="4" /> 4. Hyper Text-->
<!--                    Make Language-->
<!--                </label>-->
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
						
                        <strong>正解：2. AND回路</strong>
                        
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        この記号はAND回路です。<br />
   	 					AND回路は、左側が平で、右側が半円のような形をしています。<br />
    					2つの入力が両方とも1のときだけ、出力が1になります。
    					
    					<li><a href="question02.html">押してみな、飛ぶぞ</a></li>
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
