<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題3:次の真理値表に対応する論理回路はどれでしょう？
			</h3>

     <img src="image/or.jpg" width="600" > 
     <p>※この画像はchatGPTを用いて生成しました。</p>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. AND回路
         
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. OR回路
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. NOT回路
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. XOR回路
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. OR回路</strong>
                    </p>
                    <class="explanation">
                        <strong>解説：</strong><br />
                        OR回路は、「どちらか一方でも1なら出力が1になる」回路です。<br>真理値表を見ると、<br>
			A=0、B=1 → 出力1
			A=1、B=0 → 出力1
			A=1、B=1 → 出力1<br>
			つまり、「少なくともどちらかが1なら1」というOR回路の特徴と一致しています。
                    </p>
                     <!-- ファイルへのリンク -->
     	 <li><a href="question03.html">次の問題</a></li>
                </div>
            </details>
        </div>
    </body>
</html>
