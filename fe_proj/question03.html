<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題4:次の真理値表を主加法標準形で表したとき、正しい論理式はどれか？ </h3>

 <img src="image/主加法テスト図.png" width="400" > 
            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> A. X =
<span style="text-decoration: overline;">A</span>
<span style="text-decoration: overline;">B</span>
+ AB

                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> B.X = A<span style="text-decoration: overline;">B</span>
+ <span style="text-decoration: overline;">A</span>B
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> C.X = <span style="text-decoration: overline;">A</span>B + A<span style="text-decoration: overline;">B</span>
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> D. X = A +
<span style="text-decoration: overline;">A</span>
<span style="text-decoration: overline;">B</span>
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：C. X = <span style="text-decoration: overline;">A</span>B + A<span style="text-decoration: overline;">B</span>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        主加法標準形は「出力が1の行をANDで表し、最後にORでつなぐ」方法です。</br>
                        ANDで表すと</br>
                        A=0、B=1 → A̅B</br>
						A=1、B=0 → AB̅</br>
						ORでつなぐと</br>
						X = <span style="text-decoration: overline;">A</span>B + A<span style="text-decoration: overline;">B</span>
						
 
                    </p>

                </div>
            </details>
        </div>
    </body>
</html>
