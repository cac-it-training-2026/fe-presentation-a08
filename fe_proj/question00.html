<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1: NOT回路で入力が1のとき出力は？</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> A. 0
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> B. 1
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> C. 2
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> D. 変化しない
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：A. 0</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        NOT回路は、入力された値を反転する回路です。
                        今回の問題では入力が 1 なので、反転して 0 が出力されます。
 
                    </p>
                                    <!-- ファイルへのリンク -->
     	 <li><a href="question01.html">次の問題</a></li>
                </div>
            </details>
        </div>
    </body>
</html>
